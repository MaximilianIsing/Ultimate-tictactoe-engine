  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var origin = location.origin;
      var canon = document.querySelector('link[rel="canonical"]');
      if (canon) canon.href = origin + '/';
      document.querySelectorAll('link[rel="alternate"][hreflang]').forEach(function (link) {
        var h = link.getAttribute('href');
        if (h && h.charAt(0) === '/' && h.charAt(1) !== '/') link.setAttribute('href', origin + h);
      });
      var ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.content = origin + '/';
      function absImg(sel) {
        var m = document.querySelector(sel);
        if (!m || !m.content || m.content.indexOf('http') === 0) return;
        var path = m.content.replace(/^\//, '');
        m.content = origin + '/' + path;
      }
      absImg('meta[property="og:image"]');
      absImg('meta[name="twitter:image"]');

      var ldScript = document.querySelector('script[type="application/ld+json"]');
      if (ldScript && ldScript.textContent) {
        try {
          var data = JSON.parse(ldScript.textContent);
          function absolutizeLdUrls(node) {
            if (node == null || typeof node !== 'object') return;
            if (Array.isArray(node)) {
              for (var i = 0; i < node.length; i++) absolutizeLdUrls(node[i]);
              return;
            }
            for (var key in node) {
              if (!Object.prototype.hasOwnProperty.call(node, key)) continue;
              var val = node[key];
              if (typeof val === 'string') {
                if (val.charAt(0) === '/' && val.charAt(1) !== '/') node[key] = origin + val;
              } else if (typeof val === 'object') {
                absolutizeLdUrls(val);
              }
            }
          }
          absolutizeLdUrls(data);
          ldScript.textContent = JSON.stringify(data);
        } catch (ignore) {
          /* keep original JSON-LD */
        }
      }
    });
  </script>
